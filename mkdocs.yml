site_name: SalmonCV
site_description: Solar-powered salmon counting system for Raspberry Pi
site_url: https://nalaquq.github.io/salmoncv/
repo_url: https://github.com/Nalaquq/salmoncv
repo_name: Nalaquq/salmoncv

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started.md
    - Pi Setup: pi-setup.md
    - Coral TPU Setup: coral-tpu-setup.md
  - User Guide:
    - Web Dashboard: web-dashboard.md
    - Camera: camera.md
    - Lights: lights.md
    - Starlink: starlink.md
    - Sensors: sensors.md
    - Power & Watchdog: power.md
  - Field Deployment:
    - Wi-Fi Hotspot: hotspot.md
    - Auto-Start on Boot: auto-start.md
    - Storage: storage.md
    - Troubleshooting: troubleshooting.md
  - Reference:
    - Technical Design: technical-design.md
    - Development Log: development-log.md
    - Changelog: changelog.md

docs_dir: docs_site

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
